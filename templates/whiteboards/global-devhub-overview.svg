  <text x="1149" y="426" font-family="Inter, PingFang SC, Arial" font-size="15" font-weight="800" text-anchor="middle" fill="#334155">检索</text>
  <path d="M1190 620 L1120 620" stroke="#ea580c" stroke-width="3"/>
  <polygon points="1120,620 1135,611 1135,629" fill="#ea580c"/>
  <rect x="1120" y="589" width="58" height="30" rx="15" fill="#ffffff" stroke="#fed7aa"/>
  <text x="1149" y="610" font-family="Inter, PingFang SC, Arial" font-size="15" font-weight="800" text-anchor="middle" fill="#334155">回写</text>

  <circle cx="82" cy="900" r="8" fill="#7c3aed"/>
  <text x="104" y="909" font-family="Inter, PingFang SC, Arial" font-size="28" font-weight="800" fill="#0f172a">边界与原则</text>
  <text x="104" y="942" font-family="Inter, PingFang SC, Arial" font-size="16" fill="#64748b">避免和 Codex / Claude 的项目记忆混写</text>

  <g font-family="Inter, PingFang SC, Arial">
    <rect x="90" y="972" width="315" height="88" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="90" y="972" width="8" height="88" rx="4" fill="#7c3aed"/>
    <text x="120" y="1008" font-size="22" font-weight="800" fill="#0f172a">Agent memory</text>
    <text x="120" y="1038" font-size="15" fill="#475569">只保存协作偏好、工作方式</text>

    <rect x="450" y="972" width="315" height="88" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="450" y="972" width="8" height="88" rx="4" fill="#0f766e"/>
    <text x="480" y="1008" font-size="22" font-weight="800" fill="#0f172a">Feishu Dev Hub</text>
    <text x="480" y="1038" font-size="15" fill="#475569">保存项目事实、Bug 证据、经验</text>

    <rect x="810" y="972" width="315" height="88" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="810" y="972" width="8" height="88" rx="4" fill="#f59e0b"/>
    <text x="840" y="1008" font-size="22" font-weight="800" fill="#0f172a">Token 控制</text>
    <text x="840" y="1038" font-size="15" fill="#475569">先读摘要和索引，必要时打开长文</text>

    <rect x="1170" y="972" width="315" height="88" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="1170" y="972" width="8" height="88" rx="4" fill="#2563eb"/>
    <text x="1200" y="1008" font-size="22" font-weight="800" fill="#0f172a">图谱可读性</text>
    <text x="1200" y="1038" font-size="15" fill="#475569">靠链接、字段、标签、关系，不只看大图</text>
