<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <rect width="1600" height="1100" fill="#f8fafc"/>
  <text x="800" y="78" font-family="Inter, PingFang SC, Arial" font-size="42" font-weight="800" text-anchor="middle" fill="#0f172a">Feishu Dev Hub 总览图</text>
  <text x="800" y="118" font-family="Inter, PingFang SC, Arial" font-size="18" text-anchor="middle" fill="#64748b">给人看：入口清晰；给 AI 看：事实结构化、可检索、可回写</text>

  <circle cx="82" cy="176" r="8" fill="#2563eb"/>
  <text x="104" y="185" font-family="Inter, PingFang SC, Arial" font-size="28" font-weight="800" fill="#0f172a">入口层</text>
  <text x="104" y="218" font-family="Inter, PingFang SC, Arial" font-size="16" fill="#64748b">人类查看路径，不承载唯一状态</text>

  <g font-family="Inter, PingFang SC, Arial">
    <rect x="90" y="245" width="300" height="100" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="245" width="8" height="100" rx="4" fill="#2563eb"/>
    <circle cx="124" cy="278" r="17" fill="#2563eb"/>
    <text x="124" y="285" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">1</text>
    <text x="154" y="282" font-size="22" font-weight="800" fill="#0f172a">Wiki 首页</text>
    <text x="115" y="314" font-size="15" fill="#475569">统一导航</text>
    <text x="115" y="336" font-size="15" fill="#475569">按项目 / 模块 / 主题进入</text>

    <rect x="90" y="375" width="300" height="100" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="375" width="8" height="100" rx="4" fill="#2563eb"/>
    <circle cx="124" cy="408" r="17" fill="#2563eb"/>
    <text x="124" y="415" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">2</text>
    <text x="154" y="412" font-size="22" font-weight="800" fill="#0f172a">Docs 长文</text>
    <text x="115" y="444" font-size="15" fill="#475569">规则、复盘、设计说明</text>
    <text x="115" y="466" font-size="15" fill="#475569">适合人读和深度引用</text>

    <rect x="90" y="505" width="300" height="100" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="505" width="8" height="100" rx="4" fill="#2563eb"/>
    <circle cx="124" cy="538" r="17" fill="#2563eb"/>
    <text x="124" y="545" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">3</text>
    <text x="154" y="542" font-size="22" font-weight="800" fill="#0f172a">Whiteboard</text>
    <text x="115" y="574" font-size="15" fill="#475569">架构、排查路径、关系图</text>
    <text x="115" y="596" font-size="15" fill="#475569">适合快速扫视</text>

    <rect x="90" y="635" width="300" height="100" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="635" width="8" height="100" rx="4" fill="#2563eb"/>
    <circle cx="124" cy="668" r="17" fill="#2563eb"/>
    <text x="124" y="675" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">4</text>
    <text x="154" y="672" font-size="22" font-weight="800" fill="#0f172a">个人草稿区</text>
    <text x="115" y="704" font-size="15" fill="#475569">临时想法 / 待整理</text>
    <text x="115" y="726" font-size="15" fill="#475569">成熟后再入库</text>
  </g>

  <path d="M390 425 L455 425" stroke="#2563eb" stroke-width="3"/>
  <polygon points="455,425 440,416 440,434" fill="#2563eb"/>
  <rect x="400" y="400" width="88" height="36" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="444" y="423" font-family="Inter, PingFang SC, Arial" font-size="16" font-weight="700" text-anchor="middle" fill="#334155">导航到事实</text>

  <circle cx="500" cy="176" r="8" fill="#0f766e"/>
  <text x="522" y="185" font-family="Inter, PingFang SC, Arial" font-size="28" font-weight="800" fill="#0f172a">结构化事实源</text>
  <text x="522" y="218" font-family="Inter, PingFang SC, Arial" font-size="16" fill="#64748b">状态、证据、经验统一沉淀到 Base</text>

  <rect x="480" y="245" width="640" height="490" rx="8" fill="#ecfdf5" stroke="#5eead4" stroke-width="2"/>
  <text x="800" y="292" font-family="Inter, PingFang SC, Arial" font-size="34" font-weight="800" text-anchor="middle" fill="#065f46">Dev Hub Base</text>
  <text x="800" y="326" font-family="Inter, PingFang SC, Arial" font-size="17" font-weight="700" text-anchor="middle" fill="#0f766e">唯一状态源：项目、任务、Bug、经验、决策、产物都能被检索</text>

  <g font-family="Inter, PingFang SC, Arial">
    <rect x="520" y="360" width="285" height="76" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="520" y="360" width="8" height="76" rx="4" fill="#0f766e"/>
    <text x="546" y="391" font-size="20" font-weight="800" fill="#0f172a">Projects</text>
    <text x="546" y="418" font-size="14" fill="#475569">项目总入口 / repo / owner</text>
    <rect x="840" y="360" width="245" height="76" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="840" y="360" width="8" height="76" rx="4" fill="#0f766e"/>
    <text x="866" y="391" font-size="20" font-weight="800" fill="#0f172a">Areas</text>
    <text x="866" y="418" font-size="14" fill="#475569">模块边界 / 路径 / 风险</text>

    <rect x="520" y="455" width="285" height="76" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="520" y="455" width="8" height="76" rx="4" fill="#0f766e"/>
    <text x="546" y="486" font-size="20" font-weight="800" fill="#0f172a">Tasks</text>
    <text x="546" y="513" font-size="14" fill="#475569">todo / doing / blocked / done</text>
    <rect x="840" y="455" width="245" height="76" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="840" y="455" width="8" height="76" rx="4" fill="#0f766e"/>
    <text x="866" y="486" font-size="20" font-weight="800" fill="#0f172a">Bugfixes</text>
    <text x="866" y="513" font-size="14" fill="#475569">症状 / 证据 / 根因</text>

    <rect x="520" y="550" width="285" height="76" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="520" y="550" width="8" height="76" rx="4" fill="#0f766e"/>
    <text x="546" y="581" font-size="20" font-weight="800" fill="#0f172a">Pitfalls</text>
    <text x="546" y="608" font-size="14" fill="#475569">踩坑库 / 错误做法</text>
    <rect x="840" y="550" width="245" height="76" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="840" y="550" width="8" height="76" rx="4" fill="#0f766e"/>
    <text x="866" y="581" font-size="20" font-weight="800" fill="#0f172a">Playbooks</text>
    <text x="866" y="608" font-size="14" fill="#475569">排查手册 / 步骤 / 证据</text>

    <rect x="520" y="645" width="285" height="76" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="520" y="645" width="8" height="76" rx="4" fill="#0f766e"/>
    <text x="546" y="676" font-size="20" font-weight="800" fill="#0f172a">Artifacts</text>
    <text x="546" y="703" font-size="14" fill="#475569">Doc / Wiki / Whiteboard</text>
    <rect x="840" y="645" width="245" height="76" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="840" y="645" width="8" height="76" rx="4" fill="#0f766e"/>
    <text x="866" y="676" font-size="20" font-weight="800" fill="#0f172a">AI Runs</text>
    <text x="866" y="703" font-size="14" fill="#475569">动作 / 证据 / receipt</text>
  </g>

  <circle cx="1180" cy="176" r="8" fill="#ea580c"/>
  <text x="1202" y="185" font-family="Inter, PingFang SC, Arial" font-size="28" font-weight="800" fill="#0f172a">AI 自动化闭环</text>
  <text x="1202" y="218" font-family="Inter, PingFang SC, Arial" font-size="16" fill="#64748b">修 bug / 发 main 前后都围绕这里转</text>

  <g font-family="Inter, PingFang SC, Arial">
    <rect x="1190" y="245" width="320" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1190" y="245" width="8" height="78" rx="4" fill="#ea580c"/>
    <circle cx="1228" cy="278" r="17" fill="#ea580c"/>
    <text x="1228" y="285" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">1</text>
    <text x="1260" y="282" font-size="21" font-weight="800" fill="#0f172a">开始修 Bug / 发 main</text>
    <text x="1218" y="312" font-size="14" fill="#475569">读取当前任务和模块边界</text>

    <rect x="1190" y="356" width="320" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1190" y="356" width="8" height="78" rx="4" fill="#ea580c"/>
    <circle cx="1228" cy="389" r="17" fill="#ea580c"/>
    <text x="1228" y="396" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">2</text>
    <text x="1260" y="393" font-size="21" font-weight="800" fill="#0f172a">先查旧坑</text>
    <text x="1218" y="423" font-size="14" fill="#475569">Pitfalls / Bugfixes / Playbooks</text>

    <rect x="1190" y="467" width="320" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1190" y="467" width="8" height="78" rx="4" fill="#ea580c"/>
    <circle cx="1228" cy="500" r="17" fill="#ea580c"/>
    <text x="1228" y="507" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">3</text>
    <text x="1260" y="504" font-size="21" font-weight="800" fill="#0f172a">编码与验证</text>
    <text x="1218" y="534" font-size="14" fill="#475569">保留日志、测试、DB、trace 证据</text>

    <rect x="1190" y="578" width="320" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1190" y="578" width="8" height="78" rx="4" fill="#ea580c"/>
    <circle cx="1228" cy="611" r="17" fill="#ea580c"/>
    <text x="1228" y="618" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">4</text>
    <text x="1260" y="615" font-size="21" font-weight="800" fill="#0f172a">写回飞书</text>
    <text x="1218" y="645" font-size="14" fill="#475569">Bugfix / AI Run / Release</text>

    <rect x="1190" y="689" width="320" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1190" y="689" width="8" height="78" rx="4" fill="#ea580c"/>
    <circle cx="1228" cy="722" r="17" fill="#ea580c"/>
    <text x="1228" y="729" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">5</text>
    <text x="1260" y="726" font-size="21" font-weight="800" fill="#0f172a">生成 receipt</text>
    <text x="1218" y="756" font-size="14" fill="#475569">hook 只检查是否有真实回写</text>

    <rect x="1190" y="815" width="320" height="78" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="2"/>
    <rect x="1190" y="815" width="8" height="78" rx="4" fill="#dc2626"/>
    <text x="1220" y="855" font-size="21" font-weight="800" fill="#0f172a">失败 outbox</text>
    <text x="1220" y="882" font-size="14" fill="#475569">写入失败补偿，不生成假 receipt</text>
  </g>

  <g stroke="#ea580c" stroke-width="3" fill="#ea580c">
    <path d="M1350 323 L1350 356"/><polygon points="1350,356 1342,341 1358,341"/>
    <path d="M1350 434 L1350 467"/><polygon points="1350,467 1342,452 1358,452"/>
