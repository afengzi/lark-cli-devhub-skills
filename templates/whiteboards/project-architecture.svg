<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <text x="800" y="74" font-family="Inter, PingFang SC, Arial" font-size="40" font-weight="800" text-anchor="middle" fill="#0f172a">PROJECT_NAME Dev Hub 新架构图</text>
  <text x="800" y="112" font-family="Inter, PingFang SC, Arial" font-size="18" text-anchor="middle" fill="#64748b">让技能、脚本、模板、飞书资源和写回纪律连成一个可维护闭环</text>

  <g font-family="Inter, PingFang SC, Arial">
    <circle cx="100" cy="170" r="8" fill="#2563eb"/>
    <text x="122" y="179" font-size="27" font-weight="800" fill="#0f172a">AI / 开发者入口</text>
    <rect x="90" y="210" width="330" height="96" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="210" width="8" height="96" rx="4" fill="#2563eb"/>
    <text x="120" y="247" font-size="22" font-weight="800" fill="#0f172a">主技能 lark-cli-devhub</text>
    <text x="120" y="277" font-size="15" fill="#475569">判断该搜、该写、该调哪个领域 skill</text>

    <rect x="90" y="330" width="330" height="118" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="330" width="8" height="118" rx="4" fill="#2563eb"/>
    <text x="120" y="366" font-size="22" font-weight="800" fill="#0f172a">Workflow skills</text>
    <text x="120" y="396" font-size="15" fill="#475569">code-loop / report-loop</text>
    <text x="120" y="420" font-size="15" fill="#475569">pr-writeback / whiteboard-loop</text>

    <rect x="90" y="472" width="330" height="142" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="472" width="8" height="142" rx="4" fill="#2563eb"/>
    <text x="120" y="508" font-size="22" font-weight="800" fill="#0f172a">Domain skills</text>
    <text x="120" y="538" font-size="15" fill="#475569">base / docs-wiki / taskflow / whiteboard</text>
    <text x="120" y="562" font-size="15" fill="#475569">drive / sheets / calendar / meetings</text>
    <text x="120" y="586" font-size="15" fill="#475569">communications / slides / events</text>
  </g>

  <path d="M420 390 L490 390" stroke="#2563eb" stroke-width="3"/>
  <polygon points="490,390 475,381 475,399" fill="#2563eb"/>

  <g font-family="Inter, PingFang SC, Arial">
    <circle cx="520" cy="170" r="8" fill="#0f766e"/>
    <text x="542" y="179" font-size="27" font-weight="800" fill="#0f172a">Dev Hub Helper</text>
    <rect x="500" y="210" width="500" height="430" rx="10" fill="#ecfdf5" stroke="#5eead4" stroke-width="2"/>
    <text x="750" y="258" font-size="34" font-weight="800" text-anchor="middle" fill="#065f46">devhub.py</text>
    <text x="750" y="292" font-size="17" font-weight="700" text-anchor="middle" fill="#0f766e">把 agent 行为变成可验证写回</text>

    <rect x="540" y="330" width="200" height="78" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="540" y="330" width="8" height="78" rx="4" fill="#0f766e"/>
    <text x="568" y="362" font-size="20" font-weight="800" fill="#0f172a">config.json</text>
    <text x="568" y="390" font-size="14" fill="#475569">项目分层资源映射</text>

    <rect x="770" y="330" width="190" height="78" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="770" y="330" width="8" height="78" rx="4" fill="#0f766e"/>
    <text x="798" y="362" font-size="20" font-weight="800" fill="#0f172a">base.py</text>
    <text x="798" y="390" font-size="14" fill="#475569">表和字段初始化</text>

    <rect x="540" y="430" width="200" height="78" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="540" y="430" width="8" height="78" rx="4" fill="#0f766e"/>
    <text x="568" y="462" font-size="20" font-weight="800" fill="#0f172a">wiki_docs.py</text>
    <text x="568" y="490" font-size="14" fill="#475569">Docs / Wiki / 白板写入</text>

    <rect x="770" y="430" width="190" height="78" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="770" y="430" width="8" height="78" rx="4" fill="#0f766e"/>
    <text x="798" y="462" font-size="20" font-weight="800" fill="#0f172a">records.py</text>
    <text x="798" y="490" font-size="14" fill="#475569">receipt / outbox</text>

    <rect x="540" y="530" width="420" height="78" rx="8" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
    <rect x="540" y="530" width="8" height="78" rx="4" fill="#0f766e"/>
    <text x="568" y="562" font-size="20" font-weight="800" fill="#0f172a">templates/</text>
    <text x="568" y="590" font-size="14" fill="#475569">base-schema、wiki 完整模板、whiteboards 视觉模板、reports</text>
  </g>

  <path d="M1000 390 L1075 390" stroke="#0f766e" stroke-width="3"/>
  <polygon points="1075,390 1060,381 1060,399" fill="#0f766e"/>

  <g font-family="Inter, PingFang SC, Arial">
    <circle cx="1105" cy="170" r="8" fill="#ea580c"/>
    <text x="1127" y="179" font-size="27" font-weight="800" fill="#0f172a">飞书资源层</text>
    <rect x="1090" y="210" width="420" height="430" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>

    <rect x="1130" y="250" width="330" height="70" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1130" y="250" width="8" height="70" rx="4" fill="#ea580c"/>
    <text x="1158" y="280" font-size="21" font-weight="800" fill="#0f172a">Feishu Base</text>
    <text x="1158" y="307" font-size="14" fill="#475569">结构化事实、关系边表、AI 检索入口</text>

    <rect x="1130" y="345" width="330" height="70" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1130" y="345" width="8" height="70" rx="4" fill="#ea580c"/>
    <text x="1158" y="375" font-size="21" font-weight="800" fill="#0f172a">Wiki / Docs</text>
    <text x="1158" y="402" font-size="14" fill="#475569">完整模板、长文复盘、项目主页</text>

    <rect x="1130" y="440" width="330" height="70" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1130" y="440" width="8" height="70" rx="4" fill="#ea580c"/>
    <text x="1158" y="470" font-size="21" font-weight="800" fill="#0f172a">Whiteboards</text>
    <text x="1158" y="497" font-size="14" fill="#475569">总览、项目架构、排查路径、PR、任务闭环</text>

    <rect x="1130" y="535" width="330" height="70" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1130" y="535" width="8" height="70" rx="4" fill="#ea580c"/>
    <text x="1158" y="565" font-size="21" font-weight="800" fill="#0f172a">Feishu Tasks</text>
    <text x="1158" y="592" font-size="14" fill="#475569">真实任务、提醒、状态流转；Base 只镜像索引</text>
  </g>

  <g font-family="Inter, PingFang SC, Arial">
    <circle cx="100" cy="740" r="8" fill="#7c3aed"/>
    <text x="122" y="749" font-size="27" font-weight="800" fill="#0f172a">写回纪律</text>
    <rect x="90" y="785" width="320" height="92" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="90" y="785" width="8" height="92" rx="4" fill="#7c3aed"/>
    <text x="120" y="821" font-size="21" font-weight="800" fill="#0f172a">Search before fix</text>
    <text x="120" y="851" font-size="15" fill="#475569">先看旧 AI Runs / Bugfixes / Pitfalls</text>

    <rect x="450" y="785" width="320" height="92" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="450" y="785" width="8" height="92" rx="4" fill="#0f766e"/>
    <text x="480" y="821" font-size="21" font-weight="800" fill="#0f172a">Write after fix</text>
    <text x="480" y="851" font-size="15" fill="#475569">AI Run / Bugfix / Release / Artifact</text>

    <rect x="810" y="785" width="320" height="92" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="810" y="785" width="8" height="92" rx="4" fill="#f59e0b"/>
    <text x="840" y="821" font-size="21" font-weight="800" fill="#0f172a">Relation with IDs</text>
    <text x="840" y="851" font-size="15" fill="#475569">知道 record_id 才填关联字段</text>

    <rect x="1170" y="785" width="320" height="92" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="1170" y="785" width="8" height="92" rx="4" fill="#dc2626"/>
    <text x="1200" y="821" font-size="21" font-weight="800" fill="#0f172a">Receipt / Outbox</text>
    <text x="1200" y="851" font-size="15" fill="#475569">成功要 receipt，失败要 outbox</text>
  </g>
</svg>
