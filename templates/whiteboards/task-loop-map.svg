<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="70" font-family="Inter, PingFang SC, Arial" font-size="40" font-weight="800" text-anchor="middle" fill="#0f172a">任务执行闭环图</text>
  <text x="700" y="108" font-family="Inter, PingFang SC, Arial" font-size="18" text-anchor="middle" fill="#64748b">Feishu Task 是执行系统，Base Tasks 是 AI 可检索索引；两者要一起维护</text>

  <g font-family="Inter, PingFang SC, Arial">
    <rect x="90" y="185" width="300" height="120" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="185" width="8" height="120" rx="4" fill="#2563eb"/>
    <circle cx="128" cy="225" r="18" fill="#2563eb"/>
    <text x="128" y="232" font-size="17" font-weight="800" text-anchor="middle" fill="#ffffff">1</text>
    <text x="160" y="230" font-size="23" font-weight="800" fill="#0f172a">任务入口</text>
    <text x="122" y="264" font-size="15" fill="#475569">已有 Feishu Task：读取并更新</text>
    <text x="122" y="288" font-size="15" fill="#475569">没有任务：先创建原生 Task</text>

    <rect x="550" y="155" width="300" height="120" rx="10" fill="#ecfdf5" stroke="#5eead4" stroke-width="2"/>
    <rect x="550" y="155" width="8" height="120" rx="4" fill="#0f766e"/>
    <circle cx="588" cy="195" r="18" fill="#0f766e"/>
    <text x="588" y="202" font-size="17" font-weight="800" text-anchor="middle" fill="#ffffff">2</text>
    <text x="620" y="200" font-size="23" font-weight="800" fill="#0f172a">Base Task 镜像</text>
    <text x="582" y="234" font-size="15" fill="#475569">Status / Priority / Blocker</text>
    <text x="582" y="258" font-size="15" fill="#475569">Feishu Task URL / GUID</text>

    <rect x="1010" y="185" width="300" height="120" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1010" y="185" width="8" height="120" rx="4" fill="#ea580c"/>
    <circle cx="1048" cy="225" r="18" fill="#ea580c"/>
    <text x="1048" y="232" font-size="17" font-weight="800" text-anchor="middle" fill="#ffffff">3</text>
    <text x="1080" y="230" font-size="23" font-weight="800" fill="#0f172a">执行前检索</text>
    <text x="1042" y="264" font-size="15" fill="#475569">AI Runs / Bugfixes / Pitfalls</text>
    <text x="1042" y="288" font-size="15" fill="#475569">避免重复踩坑</text>

    <rect x="1010" y="500" width="300" height="120" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <rect x="1010" y="500" width="8" height="120" rx="4" fill="#ea580c"/>
    <circle cx="1048" cy="540" r="18" fill="#ea580c"/>
    <text x="1048" y="547" font-size="17" font-weight="800" text-anchor="middle" fill="#ffffff">4</text>
    <text x="1080" y="545" font-size="23" font-weight="800" fill="#0f172a">修复与验证</text>
    <text x="1042" y="579" font-size="15" fill="#475569">保留证据、测试命令、风险</text>
    <text x="1042" y="603" font-size="15" fill="#475569">不要只写结论</text>

    <rect x="550" y="600" width="300" height="120" rx="10" fill="#ecfdf5" stroke="#5eead4" stroke-width="2"/>
    <rect x="550" y="600" width="8" height="120" rx="4" fill="#0f766e"/>
    <circle cx="588" cy="640" r="18" fill="#0f766e"/>
    <text x="588" y="647" font-size="17" font-weight="800" text-anchor="middle" fill="#ffffff">5</text>
    <text x="620" y="645" font-size="23" font-weight="800" fill="#0f172a">写回知识库</text>
    <text x="582" y="679" font-size="15" fill="#475569">AI Run / Bugfix / Release / Artifact</text>
    <text x="582" y="703" font-size="15" fill="#475569">填 relation 时必须有 record_id</text>

    <rect x="90" y="500" width="300" height="120" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="90" y="500" width="8" height="120" rx="4" fill="#2563eb"/>
    <circle cx="128" cy="540" r="18" fill="#2563eb"/>
    <text x="128" y="547" font-size="17" font-weight="800" text-anchor="middle" fill="#ffffff">6</text>
    <text x="160" y="545" font-size="23" font-weight="800" fill="#0f172a">完成任务</text>
    <text x="122" y="579" font-size="15" fill="#475569">Feishu Task -> Done / Verify</text>
    <text x="122" y="603" font-size="15" fill="#475569">Base Task 同步状态与下一步</text>
  </g>

  <g stroke="#334155" stroke-width="3" fill="#334155">
    <path d="M390 245 C450 190 490 185 550 210"/><polygon points="550,210 532,210 541,225"/>
    <path d="M850 210 C920 185 960 190 1010 245"/><polygon points="1010,245 994,237 997,255"/>
    <path d="M1160 305 L1160 500"/><polygon points="1160,500 1151,485 1169,485"/>
    <path d="M1010 560 C940 640 920 660 850 660"/><polygon points="850,660 865,651 865,669"/>
    <path d="M550 660 C470 655 430 620 390 560"/><polygon points="390,560 406,568 404,550"/>
    <path d="M240 500 L240 305"/><polygon points="240,305 231,320 249,320"/>
  </g>

  <g font-family="Inter, PingFang SC, Arial">
    <rect x="455" y="355" width="490" height="145" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <text x="700" y="402" font-size="28" font-weight="800" text-anchor="middle" fill="#0f172a">闭环原则</text>
    <text x="700" y="440" font-size="17" font-weight="700" text-anchor="middle" fill="#475569">任务不是一张 Base 表就够了</text>
    <text x="700" y="470" font-size="16" text-anchor="middle" fill="#64748b">执行靠 Feishu Task，回看靠 Base，复盘靠 Docs，关系靠 Whiteboard</text>
  </g>

  <g font-family="Inter, PingFang SC, Arial">
    <circle cx="105" cy="790" r="8" fill="#7c3aed"/>
    <text x="127" y="799" font-size="25" font-weight="800" fill="#0f172a">升级沉淀</text>
    <rect x="90" y="830" width="250" height="54" rx="8" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="120" y="864" font-size="18" font-weight="800" fill="#0f172a">重复错误 -> Pitfall</text>
    <rect x="390" y="830" width="250" height="54" rx="8" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="420" y="864" font-size="18" font-weight="800" fill="#0f172a">稳定流程 -> Playbook</text>
    <rect x="690" y="830" width="250" height="54" rx="8" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="720" y="864" font-size="18" font-weight="800" fill="#0f172a">架构取舍 -> Decision</text>
    <rect x="990" y="830" width="300" height="54" rx="8" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="1020" y="864" font-size="18" font-weight="800" fill="#0f172a">结构变化 -> Whiteboard</text>
  </g>
</svg>
